<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>WebRTC Screen Share Star Topology</title>
  <style>
    video {
      width: 80vw;
      max-width: 1000px;
      border: 1px solid #ccc;
      margin-top: 12px;
    }
    #localVideo, #remoteVideo {
      background: #111;
    }
  </style>
</head>
<body>
  <h2>WebRTC Screen Share</h2>
  <div id="status">Connecting...</div>
  <button id="startButton" style="display:none;">Start Screen Share</button>

  <div>
    <video id="localVideo" autoplay playsinline muted></video>
    <video id="remoteVideo" autoplay playsinline></video>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/js/main.js"></script>
</body>
</html>
